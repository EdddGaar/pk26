<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in Peque Recorre</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn { padding: 15px; border-radius: 50px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin: 5px 0; color: white; }
        .btn-azul { background: #1D71B8; }
        .btn-naranja { background: #E94E1B; }
        input { padding: 15px; width: 90%; border-radius: 50px; border: 1px solid #ccc; margin-bottom: 15px; text-align: center; font-size: 16px; }
        #video { width: 100%; max-width: 350px; border-radius: 15px; border: 4px solid #1D71B8; display: none; margin: 15px auto; }
        #msg { padding: 15px; border-radius: 10px; font-weight: bold; display: none; margin-top: 15px; }
        .ok { background: #d4edda; color: #155724; }
        .warn { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }
        .item-lista { background: #fff; border: 1px solid #1D71B8; padding: 10px; margin: 5px 0; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#1D71B8">PEQUE RECORRE 🏁</h2>
        <input type="text" id="busqueda" placeholder="Nombre o Folio">
        <button class="btn btn-azul" onclick="buscar(document.getElementById('busqueda').value)">🔍 BUSCAR</button>
        <button class="btn btn-naranja" onclick="iniciarCamara()">📷 ESCANEAR QR</button>
        
        <video id="video" playsinline></video>
        <div id="msg"></div>
    </div>

    <script>
        // --- ⚙️ PEGA TU URL DE APPS SCRIPT AQUÍ ---
        const URL_SCRIPT = "TU_URL_DE_APPS_SCRIPT_AQUI";

        function buscar(valor) {
            if (!valor) return;
            const msg = document.getElementById("msg");
            msg.style.display = "block";
            msg.className = "warn";
            msg.innerHTML = "⏳ Consultando base de datos...";

            const s = document.createElement('script');
            s.src = `${URL_SCRIPT}?valor=${encodeURIComponent(valor)}&callback=callbackCheckIn`;
            document.body.appendChild(s);
            document.body.removeChild(s);
        }

        window.callbackCheckIn = function(res) {
            const msg = document.getElementById("msg");
            msg.className = res.status;
            if (res.status === "multiple") {
                let list = "<b>Varios encontrados:</b><br>";
                res.data.forEach(r => {
                    list += `<div class="item-lista" onclick="buscar('${r.nombre}')">${r.nombre}<br><small>${r.categoria}</small></div>`;
                });
                msg.innerHTML = list;
            } else {
                msg.innerHTML = res.msg;
                if(res.status === "ok") {
                    document.getElementById("busqueda").value = "";
                    if(navigator.vibrate) navigator.vibrate(200);
                }
            }
        };

        function iniciarCamara() {
            const v = document.getElementById("video");
            v.style.display = "block";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
                v.srcObject = stream;
                v.play();
                requestAnimationFrame(escanear);
            });
        }

        function escanear() {
            const v = document.getElementById("video");
            if (v.readyState === v.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(v, 0, 0);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                    v.style.display = "none";
                    buscar(code.data);
                    return;
                }
            }
            requestAnimationFrame(escanear);
        }
    </script>
</body>
</html>
