<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peque Recorre Check-in</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 20px; }
        .btn { background: #1D71B8; color: white; padding: 15px; border-radius: 50px; border: none; width: 100%; font-size: 18px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #video { width: 100%; max-width: 400px; border-radius: 15px; border: 5px solid #1D71B8; display: none; margin: auto; }
        #result { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; }
        .ok { background: #d4edda; color: #155724; }
        .warn { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }
        .item { background: white; border: 1px solid #ccc; padding: 10px; margin: 5px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>PEQUE RECORRE 🏁</h2>
    <input type="text" id="busqueda" placeholder="Nombre o Folio" style="padding:15px; width:80%; border-radius:50px; border:1px solid #ccc; margin-bottom:10px;">
    <button class="btn" onclick="consultar(document.getElementById('busqueda').value)">🔍 BUSCAR</button>
    <button class="btn" style="background:#E94E1B" onclick="encenderCamara()">📷 ESCANEAR QR</button>
    
    <div id="result"></div>
    <video id="video" playsinline></video>

    <script>
        const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // REEMPLAZA ESTO

        function consultar(valor) {
            if (!valor) return;
            const resDiv = document.getElementById("result");
            resDiv.style.display = "block";
            resDiv.className = "warn";
            resDiv.innerHTML = "⏳ Consultando...";

            const script = document.createElement('script');
            script.src = `${WEB_APP_URL}?valor=${encodeURIComponent(valor)}&callback=respuesta`;
            document.body.appendChild(script);
        }

        window.respuesta = function(res) {
            const resDiv = document.getElementById("result");
            resDiv.className = res.status;
            if (res.status === "multiple") {
                let html = "Selecciona:<br>";
                res.data.forEach(r => {
                    html += `<div class="item" onclick="consultar('${r.nombre}')">${r.nombre} (${r.categoria})</div>`;
                });
                resDiv.innerHTML = html;
            } else {
                resDiv.innerHTML = res.msg;
                if(res.status === "ok") document.getElementById("busqueda").value = "";
            }
        };

        function encenderCamara() {
            const v = document.getElementById("video");
            v.style.display = "block";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
                v.srcObject = s;
                v.play();
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            const v = document.getElementById("video");
            if (v.readyState === v.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(v, 0, 0);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                    v.style.display = "none";
                    consultar(code.data);
                    return;
                }
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
