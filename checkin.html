<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Check-in Peque Recorre</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        :root { --azul: #1D71B8; --naranja: #E94E1B; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #f4f7f9; text-align: center; color: #333; padding-bottom: 40px; }
        .header-img { width: 100%; max-width: 500px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: block; margin: 0 auto; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        h1 { color: var(--azul); font-weight: 900; font-size: 22px; margin: 15px 0; }
        
        /* Inputs y Botones */
        .input-group { margin-bottom: 20px; }
        input { padding: 15px; width: 100%; border: 2px solid #ddd; border-radius: 50px; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; font-family: inherit; }
        .btn { background: var(--azul); color: white; padding: 15px; border-radius: 50px; border: none; font-weight: bold; width: 100%; font-size: 16px; margin: 5px 0; cursor: pointer; transition: 0.3s; }
        .btn-qr { background: var(--naranja); margin-top: 10px; }
        
        /* Cámara y Resultados */
        #video { width: 100%; max-width: 400px; border-radius: 20px; border: 5px solid var(--azul); display: none; margin: 20px auto; background: #000; }
        .status-box { padding: 15px; margin: 20px 0; border-radius: 15px; font-weight: bold; display: none; }
        
        /* Colores de Respuesta */
        .sending { background: #eee; color: #666; }
        .ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        footer { margin-top: 30px; font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/EdddGaar/pk26/0736f0bae6bb4aac915f93b67fad761692512464/Bannner.png" class="header-img">
    
    <div class="container">
        <h1>STAFF CHECK-IN 🏁</h1>
        
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Escribe Nombre o Folio">
            <button class="btn" onclick="enviarAlServidor(document.getElementById('searchInput').value)">🔍 BUSCAR Y REGISTRAR</button>
        </div>

        <button class="btn btn-qr" id="qrBtn" onclick="toggleScanner()">📷 ESCANEAR CÓDIGO QR</button>
        
        <div id="status" class="status-box"></div>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" hidden></canvas>
        
        <footer>© 2026 RE-CORRE TOLUCA | PEQUE RECORRE</footer>
    </div>

    <script>
        // --- ⚙️ CONFIGURACIÓN ---
        // REEMPLAZA ESTO CON TU URL DE APPS SCRIPT (LA QUE TERMINA EN /exec)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_XXXXXXXXX/exec"; 

        const video = document.getElementById("video");
        const statusDiv = document.getElementById("status");
        const qrBtn = document.getElementById("qrBtn");
        let scanning = false;
        let streamRef = null;

        // --- 🚀 ENVÍO DE DATOS ---
        async function enviarAlServidor(valor) {
            if (!valor) return;
            
            // Mostrar estado de carga
            statusDiv.style.display = "block";
            statusDiv.className = "status-box sending";
            statusDiv.innerHTML = "⏳ Procesando registro...";

            try {
                // Usamos POST con no-cors para saltar bloqueos de seguridad
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    cache: "no-cache",
                    body: JSON.stringify({ valor: valor })
                });

                // Como es no-cors, el navegador no nos deja leer la respuesta de Google,
                // pero si el fetch no falla, es que se envió correctamente.
                statusDiv.className = "status-box ok";
                statusDiv.innerHTML = "✅ PETICIÓN ENVIADA<br><small>Folio: " + valor.toUpperCase() + "<br>Revisa el Sheets para confirmar.</small>";
                
                // Limpiar input y vibrar (si el cel lo permite)
                document.getElementById('searchInput').value = "";
                if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                
            } catch (err) {
                statusDiv.className = "status-box error";
                statusDiv.innerHTML = "❌ ERROR DE CONEXIÓN";
                console.error(err);
            }
        }

        // --- 📷 LÓGICA DE CÁMARA ---
        async function toggleScanner() {
            if (scanning) { stopScan(); return; }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                streamRef = stream;
                video.srcObject = stream;
                video.style.display = "block";
                qrBtn.innerText = "⏹️ DETENER CÁMARA";
                qrBtn.style.background = "#333";
                scanning = true;
                video.play();
                requestAnimationFrame(tick);
            } catch (err) {
                alert("⚠️ Error de cámara: Asegúrate de usar HTTPS y dar permisos.");
            }
        }

        function stopScan() {
            scanning = false;
            video.style.display = "none";
            qrBtn.innerText = "📷 ESCANEAR CÓDIGO QR";
            qrBtn.style.background = "var(--naranja)";
            if (streamRef) streamRef.getTracks().forEach(t => t.stop());
        }

        function tick() {
            if (!scanning) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.getElementById("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height);

                if (code) {
                    stopScan();
                    enviarAlServidor(code.data);
                    return;
                }
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
